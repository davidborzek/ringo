# release-plz manages versions, changelogs and crates.io publishing (in dependency
# order). cargo-dist owns the GitHub releases + binaries + Homebrew (see
# dist-workspace.toml / .github/workflows/release.yml).
#
# Flow: push to main -> release-plz opens/updates a "Release PR" (version bump +
# changelogs). Merging it -> release-plz publishes core→phone→flow to crates.io and
# pushes ONE shared tag `v{version}`; that tag triggers cargo-dist (one unified
# release for both binaries). Needs a PAT (RELEASE_PLZ_TOKEN) so the tag triggers
# cargo-dist — a GITHUB_TOKEN-pushed tag does not start other workflows.

[workspace]
# cargo-dist creates the GitHub releases, not release-plz.
git_release_enable = false

[changelog]
# Mirror the previous cliff.toml grouping (skip chore/style noise).
commit_parsers = [
  { message = "^[Ff]eat", group = "Features" },
  { message = "^[Ff]ix", group = "Bug Fixes" },
  { message = "^[Rr]efactor", group = "Refactor" },
  { message = "^[Dd]ocs", group = "Documentation" },
  { message = "^[Tt]est", group = "Tests" },
  { message = "^[Ss]tyle|^[Cc]hore|^[Cc]i", skip = true },
]

# All three crates share one version (`version.workspace = true`). Only ONE tag is
# created — `v{version}` on ringo-phone — so cargo-dist runs once and makes a single
# unified release for both binaries. core + flow are published but not tagged
# separately (no per-crate tags to avoid triggering cargo-dist multiple times).
[[package]]
name = "ringo-core"
git_tag_enable = false

[[package]]
name = "ringo-phone"
git_tag_name = "v{{ version }}"

[[package]]
name = "ringo-flow"
git_tag_enable = false
