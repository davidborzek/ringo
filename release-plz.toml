# release-plz orchestrates the whole workspace: it bumps versions (per crate, from
# the commits), keeps inter-crate `version` requirements in sync, writes changelogs,
# and publishes to crates.io in dependency order — which removes the "a dependent
# crate was published against a stale sibling" footgun entirely.
#
# Flow: push to main -> release-plz opens/updates a "Release PR" (version bumps +
# changelogs). Merging that PR -> release-plz publishes + tags + creates the GitHub
# releases. Nothing publishes until the Release PR is merged.

[workspace]
# In 0.x, treat a `feat` as a breaking change: bump the minor (0.x -> 0.(x+1))
# instead of the patch. Matches SemVer's 0.x rule where the minor is the
# breaking level, so a new feature no longer ships as a mere patch.
features_always_increment_minor = true

[changelog]
# Mirror the previous cliff.toml grouping (skip chore/style noise).
commit_parsers = [
  { message = "^[Ff]eat", group = "Features" },
  { message = "^[Ff]ix", group = "Bug Fixes" },
  { message = "^[Rr]efactor", group = "Refactor" },
  { message = "^[Dd]ocs", group = "Documentation" },
  { message = "^[Tt]est", group = "Tests" },
  { message = "^[Ss]tyle|^[Cc]hore|^[Cc]i", skip = true },
]

# Each crate carries its own version, so release-plz bumps and releases only the
# crates a change actually touches — a ringo-core bump propagates to its dependents,
# but a ringo-phone-only change no longer drags ringo-flow along (and vice versa).
# Tags are prefixed per crate (`<crate>-vX.Y.Z`) so they're unambiguous.
[[package]]
name = "ringo-core"
# Internal support crate: publish + tag it, but no standalone GitHub release page.
git_release_enable = false
git_tag_name = "ringo-core-v{{ version }}"

[[package]]
name = "ringo-agent"
# Internal support crate (the per-agent process backend): publish + tag, but no
# standalone GitHub release page. Must be published — ringo-flow depends on it
# with a version requirement; release-plz publishes it in dependency order.
git_release_enable = false
git_tag_name = "ringo-agent-v{{ version }}"

[[package]]
name = "ringo-phone"
git_tag_name = "ringo-phone-v{{ version }}"

[[package]]
name = "ringo-flow"
git_tag_name = "ringo-flow-v{{ version }}"
