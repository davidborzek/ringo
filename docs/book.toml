[book]
title = "ringo"
authors = ["David Borzek"]
description = "Tooling for baresip SIP softphones — the ringo softphone and the ringo-flow scenario test runner."
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/davidborzek/ringo"
edit-url-template = "https://github.com/davidborzek/ringo/edit/main/docs/{path}"
# Project Pages live under /ringo/; the whole site is one book mounted there.
site-url = "/ringo/"
# Sidebar auto-numbering hidden + landing-page styles (see custom.css).
additional-css = ["custom.css"]

[output.html.search]
enable = true

# Collapse chapters that have sub-pages by default (so the long API reference list
# isn't always expanded); the active page's branch still auto-expands.
[output.html.fold]
enable = true
level = 0

# Code blocks use `rust` only for highlighting (the scripts are Rhai), so drop the
# "Run" button that would send them to the Rust Playground.
[output.html.playground]
runnable = false
