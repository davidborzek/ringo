name: docs

# Build the documentation site and deploy it to GitHub Pages. The whole site is a
# single mdBook (docs/) — a landing page plus one section per tool — mounted at
# davidborzek.github.io/ringo/. Add a tool by dropping a docs/src/<tool>/ section
# and listing it in docs/src/SUMMARY.md; no workflow change needed.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - name: Build site
        run: mdbook build docs --dest-dir "$GITHUB_WORKSPACE/site"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
