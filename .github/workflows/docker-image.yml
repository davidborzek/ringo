name: Docker image (GHCR)

# Reusable: build + push the multi-arch ringo-flow image to GHCR. Called by
# release-plz on release; also `workflow_dispatch`able to re-push for a tag.
#
# Native multi-arch (no QEMU): each arch builds on its own runner and pushes by
# digest, then a merge job stitches the digests into one multi-arch tag. The
# Dockerfile compiles the whole vendored C stack from source, so emulated builds
# would be far too slow — hence native runners (arm64 is free for public repos).

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        type: string
        required: true
      flow_tag:
        description: "ringo-flow tag (ringo-flow-vX.Y.Z) → image version"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        type: string
        required: true
      flow_tag:
        description: "ringo-flow tag (ringo-flow-vX.Y.Z) → image version"
        type: string
        required: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            os: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/ringo-flow/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/ringo-flow,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/ringo-flow
          FLOW_TAG: ${{ inputs.flow_tag }}
        run: |
          version="${FLOW_TAG#ringo-flow-v}"
          docker buildx imagetools create \
            -t "${IMAGE}:${version}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE}:${version}"
