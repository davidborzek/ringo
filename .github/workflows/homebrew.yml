name: Homebrew tap

# Reusable: render the formula templates with the release binaries' checksums and
# push them to the tap (custom; no cargo-dist). Called by release-plz after the
# binaries are attached; also `workflow_dispatch`able to re-render the formulae
# for a tag. Needs HOMEBREW_TAP_TOKEN — callers pass `secrets: inherit`.

on:
  workflow_call:
    inputs:
      phone_tag:
        description: "ringo-phone tag (ringo-phone-vX.Y.Z); empty if not released"
        type: string
        required: false
        default: ""
      flow_tag:
        description: "ringo-flow tag (ringo-flow-vX.Y.Z); empty if not released"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      phone_tag:
        description: "ringo-phone tag (ringo-phone-vX.Y.Z); empty if not released"
        type: string
        required: false
        default: ""
      flow_tag:
        description: "ringo-flow tag (ringo-flow-vX.Y.Z); empty if not released"
        type: string
        required: false
        default: ""

jobs:
  update:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render formulae & push to tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # to read release assets
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }} # to push to the tap repo
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          PHONE_TAG: ${{ inputs.phone_tag }}
          FLOW_TAG: ${{ inputs.flow_tag }}
        run: |
          set -euo pipefail
          sha() { gh release download "$1" -R "$REPO" -p "$2" -O - | sha256sum | cut -d' ' -f1; }
          # render <template> <base-url> <prefix> <tag> <version> <out>
          # <prefix> is "ringo" or "ringo-flow"; tarballs are <prefix>-<version>-<target>.tar.gz
          render() {
            sed \
              -e '/^# /d' \
              -e "s|__VERSION__|$5|g" \
              -e "s|__BASE__|$2|g" \
              -e "s|__SHA_DARWIN_ARM__|$(sha "$4" "$3-$5-aarch64-apple-darwin.tar.gz")|" \
              -e "s|__SHA_DARWIN_X64__|$(sha "$4" "$3-$5-x86_64-apple-darwin.tar.gz")|" \
              -e "s|__SHA_LINUX_ARM__|$(sha "$4" "$3-$5-aarch64-unknown-linux-gnu.tar.gz")|" \
              -e "s|__SHA_LINUX_X64__|$(sha "$4" "$3-$5-x86_64-unknown-linux-gnu.tar.gz")|" \
              "$1" > "$6"
          }
          rel="https://github.com/${REPO}/releases/download"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${OWNER}/homebrew-tap.git" tap
          mkdir -p tap/Formula
          # Render only the formula for a crate that was actually released — with
          # independent versioning a run may carry just one of the two tags.
          msg=""
          if [ -n "$PHONE_TAG" ]; then
            ver="${PHONE_TAG#ringo-phone-v}"
            render .github/homebrew/ringo.rb "${rel}/${PHONE_TAG}" ringo "$PHONE_TAG" "$ver" tap/Formula/ringo.rb
            msg="ringo $ver"
          fi
          if [ -n "$FLOW_TAG" ]; then
            ver="${FLOW_TAG#ringo-flow-v}"
            render .github/homebrew/ringo-flow.rb "${rel}/${FLOW_TAG}" ringo-flow "$FLOW_TAG" "$ver" tap/Formula/ringo-flow.rb
            msg="${msg:+$msg, }ringo-flow $ver"
          fi
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula
          git commit -m "$msg" || { echo "no changes"; exit 0; }
          git push
