name: Release ringo-flow

# ringo-flow is versioned independently of the workspace (it's pre-1.0/beta), so
# it has its own tag series. The workspace (ringo-core + ringo-phone) keeps using
# `vX.Y.Z`; ringo-flow uses `ringo-flow-v<version>`, e.g.
# `ringo-flow-v0.1.0-beta.1`. A `-` in the version marks the GitHub release as a
# pre-release. The two patterns don't overlap, so the workflows never collide.
on:
  push:
    tags:
      - 'ringo-flow-v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install aarch64 Linux cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p ringo-flow

      - name: Package
        run: cp target/${{ matrix.target }}/release/ringo-flow ringo-flow-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ringo-flow-${{ matrix.target }}
          path: ringo-flow-${{ matrix.target }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # ringo-core is already published (the workspace release publishes it), and
      # ringo-flow depends on it by version, so ringo-flow can publish on its own.
      - run: cargo publish -p ringo-flow
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker:
    name: Build & push Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tags
        id: tags
        run: |
          # Tag is `ringo-flow-v<version>`; the image version drops that prefix.
          version="${GITHUB_REF_NAME#ringo-flow-v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ringo-flow"
          # Every release publishes the exact version plus moves `:latest`.
          echo "tags=${image}:${version},${image}:latest" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/ringo-flow/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Cache the (slow) baresip + Rust compile layers between releases.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          # Mark beta/rc tags (those with a `-` in the version) as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ringo-flow-x86_64-unknown-linux-gnu/ringo-flow-x86_64-unknown-linux-gnu
            ringo-flow-aarch64-unknown-linux-gnu/ringo-flow-aarch64-unknown-linux-gnu
            ringo-flow-x86_64-apple-darwin/ringo-flow-x86_64-apple-darwin
            ringo-flow-aarch64-apple-darwin/ringo-flow-aarch64-apple-darwin
