name: Release-plz

# release-plz owns versioning, changelogs, crates.io publishing (in dependency
# order) and GitHub releases for the whole workspace. The binary build (ringo-phone)
# and the Docker image (ringo-flow) hang off release-plz's `releases` output in the
# same run, so no cross-workflow tag trigger / PAT is needed.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens/updates the "Release PR" with version bumps + changelogs.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build dependencies
        # The publish verify-build links the ringo-phone/ringo-flow binaries
        # against opus + spandsp (dynamic, like the release binaries / Homebrew).
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libspandsp-dev libpulse-dev pkg-config
      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # On merge of the Release PR: publish to crates.io (core → phone/flow), tag, and
  # create GitHub releases. Exposes which crates were released (+ their tags).
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      phone_tag: ${{ steps.tags.outputs.phone_tag }}
      flow_tag: ${{ steps.tags.outputs.flow_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build dependencies
        # The publish verify-build links the ringo-phone/ringo-flow binaries
        # against opus + spandsp (dynamic, like the release binaries / Homebrew).
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libspandsp-dev libpulse-dev pkg-config
      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Extract released tags
        id: tags
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          rel='${{ steps.release-plz.outputs.releases }}'
          echo "phone_tag=$(echo "$rel" | jq -r '.[] | select(.package_name=="ringo-phone") | .tag // empty')" >> "$GITHUB_OUTPUT"
          echo "flow_tag=$(echo "$rel" | jq -r '.[] | select(.package_name=="ringo-flow") | .tag // empty')" >> "$GITHUB_OUTPUT"

  # ringo-phone binaries → attached to its GitHub release (only if released).
  # The cross-platform build/link/smoke logic is shared with PR CI via the
  # reusable build-binaries workflow (upload=true here attaches the tarballs).
  phone-binaries:
    needs: release
    if: needs.release.outputs.phone_tag != ''
    permissions:
      contents: write
    uses: ./.github/workflows/build-binaries.yml
    with:
      package: ringo-phone
      ref: ${{ needs.release.outputs.phone_tag }}
      tag: ${{ needs.release.outputs.phone_tag }}
      upload: true

  # ringo-flow binaries → attached to its GitHub release (only if released).
  flow-binaries:
    needs: release
    if: needs.release.outputs.flow_tag != ''
    permissions:
      contents: write
    uses: ./.github/workflows/build-binaries.yml
    with:
      package: ringo-flow
      ref: ${{ needs.release.outputs.flow_tag }}
      tag: ${{ needs.release.outputs.flow_tag }}
      upload: true

  # ringo-flow Docker image → GHCR (only if ringo-flow was released).
  flow-docker:
    needs: release
    if: needs.release.outputs.flow_tag != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-image.yml
    with:
      ref: ${{ needs.release.outputs.flow_tag }}
      flow_tag: ${{ needs.release.outputs.flow_tag }}

  # Homebrew: render the formula templates with the release binaries' checksums
  # and push them to the tap. Runs after the binaries are attached.
  # Runs if either crate was released; one of the binary jobs may be skipped (only
  # the released crate builds), so guard with !cancelled() && !failure() rather than
  # the default all-needs-succeeded. homebrew.yml renders only the formula(e) whose
  # tag is non-empty.
  homebrew:
    needs: [release, phone-binaries, flow-binaries]
    if: ${{ !cancelled() && !failure() && (needs.release.outputs.phone_tag != '' || needs.release.outputs.flow_tag != '') }}
    uses: ./.github/workflows/homebrew.yml
    secrets: inherit
    with:
      phone_tag: ${{ needs.release.outputs.phone_tag }}
      flow_tag: ${{ needs.release.outputs.flow_tag }}

  # AUR `-bin` packages — same gating as homebrew; aur.yml publishes only the
  # package(s) whose tag is non-empty.
  aur:
    needs: [release, phone-binaries, flow-binaries]
    if: ${{ !cancelled() && !failure() && (needs.release.outputs.phone_tag != '' || needs.release.outputs.flow_tag != '') }}
    uses: ./.github/workflows/aur.yml
    secrets: inherit
    with:
      phone_tag: ${{ needs.release.outputs.phone_tag }}
      flow_tag: ${{ needs.release.outputs.flow_tag }}
