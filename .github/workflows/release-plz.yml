name: Release-plz

# release-plz owns versioning, changelogs, crates.io publishing (in dependency
# order) and GitHub releases for the whole workspace. The binary build (ringo-phone)
# and the Docker image (ringo-flow) hang off release-plz's `releases` output in the
# same run, so no cross-workflow tag trigger / PAT is needed.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens/updates the "Release PR" with version bumps + changelogs.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # On merge of the Release PR: publish to crates.io (core → phone/flow), tag, and
  # create GitHub releases. Exposes which crates were released (+ their tags).
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      phone_tag: ${{ steps.tags.outputs.phone_tag }}
      flow_tag: ${{ steps.tags.outputs.flow_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Extract released tags
        id: tags
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          rel='${{ steps.release-plz.outputs.releases }}'
          echo "phone_tag=$(echo "$rel" | jq -r '.[] | select(.package_name=="ringo-phone") | .tag // empty')" >> "$GITHUB_OUTPUT"
          echo "flow_tag=$(echo "$rel" | jq -r '.[] | select(.package_name=="ringo-flow") | .tag // empty')" >> "$GITHUB_OUTPUT"

  # ringo-phone binaries → attached to its GitHub release (only if it was released).
  #
  # Single binary per target — audio auto-detected by build.rs:
  #   Linux  → pulse (via pkg-config, works on PulseAudio + PipeWire)
  #   macOS  → coreaudio (system framework, zero deps)
  #
  # Linux x86_64 builds inside a debian:bullseye container (glibc 2.31) for
  # maximum compatibility, then smoke-tests in debian:bookworm-slim.
  #
  # Users who need ALSA instead of pulse can build from source:
  #   cargo build --features alsa
  phone-binaries:
    name: ringo-phone ${{ matrix.target }}
    needs: release
    if: needs.release.outputs.phone_tag != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.phone_tag }}
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        with:
          key: ${{ matrix.target }}
      - name: Install Linux build dependencies (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev llvm-dev pkg-config perl \
            libspandsp-dev libopus-dev libpulse-dev \
            gcc-aarch64-linux-gnu
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libspandsp-dev:arm64 libopus-dev:arm64 \
            libpulse-dev:arm64
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config spandsp opus
      - name: Set up aarch64 cross-compilation env
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - name: Build (Linux x86_64 in bullseye container)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          docker build -t ringo-builder -f docker/builder.Dockerfile .
          docker run --rm -v "$PWD:/work" \
            -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) \
            ringo-builder sh -c 'CARGO_TARGET_DIR=/work/target-linux-x86_64 cargo build --release -p ringo-phone && chown -R $HOST_UID:$HOST_GID /work/target-linux-x86_64'
      - name: Build (aarch64 cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu -p ringo-phone
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }} -p ringo-phone
      - name: Smoke test (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cp target-linux-x86_64/release/ringo ringo
          docker build -f docker/smoke-phone.Dockerfile .
      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: target/${{ matrix.target }}/release/ringo --help
      - name: Package
        run: |
          version="${{ needs.release.outputs.phone_tag }}"
          version="${version#ringo-phone-v}"
          target="${{ matrix.target }}"
          dir="ringo-${version}-${target}"
          mkdir -p "$dir"
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cp "target-linux-x86_64/release/ringo" "$dir/"
          else
            cp "target/${target}/release/ringo" "$dir/"
          fi
          tar czf "${dir}.tar.gz" "$dir"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.phone_tag }}
          files: ringo-*.tar.gz

  # ringo-flow binaries → attached to its GitHub release (only if it was released).
  #
  # Linux x86_64 builds inside a debian:bullseye container (glibc 2.31) for
  # maximum compatibility, then smoke-tests in debian:bookworm-slim.
  flow-binaries:
    name: Build ringo-flow ${{ matrix.target }}
    needs: release
    if: needs.release.outputs.flow_tag != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.flow_tag }}
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: matrix.target != 'x86_64-unknown-linux-gnu'
      - name: Install Linux build dependencies (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev llvm-dev pkg-config perl \
            libspandsp-dev libopus-dev \
            gcc-aarch64-linux-gnu
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libspandsp-dev:arm64 libopus-dev:arm64
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config spandsp opus
      - name: Set up aarch64 cross-compilation env
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - name: Build (Linux x86_64 in bullseye container)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          docker build -t ringo-builder -f docker/builder.Dockerfile .
          docker run --rm -v "$PWD:/work" \
            -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) \
            ringo-builder sh -c 'CARGO_TARGET_DIR=/work/target-linux-x86_64 cargo build --release -p ringo-flow && chown -R $HOST_UID:$HOST_GID /work/target-linux-x86_64'
      - name: Build (aarch64 cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu -p ringo-flow
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }} -p ringo-flow
      - name: Smoke test (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cp target-linux-x86_64/release/ringo-flow ringo-flow
          docker build -f docker/smoke-flow.Dockerfile .
      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: target/${{ matrix.target }}/release/ringo-flow --help
      - name: Package
        run: |
          version="${{ needs.release.outputs.flow_tag }}"
          version="${version#ringo-flow-v}"
          target="${{ matrix.target }}"
          dir="ringo-flow-${version}-${target}"
          mkdir -p "$dir"
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cp "target-linux-x86_64/release/ringo-flow" "$dir/"
          else
            cp "target/${target}/release/ringo-flow" "$dir/"
          fi
          tar czf "ringo-flow-${version}-${target}.tar.gz" "$dir"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.flow_tag }}
          files: ringo-flow-*.tar.gz

  # ringo-flow Docker image → GHCR (only if ringo-flow was released).
  flow-docker:
    name: Build & push ringo-flow image (GHCR)
    needs: release
    if: needs.release.outputs.flow_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.flow_tag }}
          submodules: true
      - name: Compute image tags
        id: tags
        run: |
          version="${FLOW_TAG#ringo-flow-v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ringo-flow"
          echo "tags=${image}:${version},${image}:latest" >> "$GITHUB_OUTPUT"
        env:
          FLOW_TAG: ${{ needs.release.outputs.flow_tag }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/ringo-flow/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Homebrew: render the formula templates with the release binaries' checksums and
  # push them to the tap. Custom (no cargo-dist); reuses the binaries built above.
  homebrew:
    name: Update Homebrew tap
    needs: [release, phone-binaries, flow-binaries]
    if: needs.release.outputs.phone_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render formulae & push to tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # to read release assets
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }} # to push to the tap repo
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          PHONE_TAG: ${{ needs.release.outputs.phone_tag }}
          FLOW_TAG: ${{ needs.release.outputs.flow_tag }}
        run: |
          set -euo pipefail
          sha() { gh release download "$1" -R "$REPO" -p "$2" -O - | sha256sum | cut -d' ' -f1; }
          # render <template> <base-url> <prefix> <tag> <version> <out>
          # <prefix> is "ringo" or "ringo-flow"; tarballs are <prefix>-<version>-<target>.tar.gz
          render() {
            sed \
              -e '/^# /d' \
              -e "s|__VERSION__|$5|g" \
              -e "s|__BASE__|$2|g" \
              -e "s|__SHA_DARWIN_ARM__|$(sha "$4" "$3-$5-aarch64-apple-darwin.tar.gz")|" \
              -e "s|__SHA_DARWIN_X64__|$(sha "$4" "$3-$5-x86_64-apple-darwin.tar.gz")|" \
              -e "s|__SHA_LINUX_ARM__|$(sha "$4" "$3-$5-aarch64-unknown-linux-gnu.tar.gz")|" \
              -e "s|__SHA_LINUX_X64__|$(sha "$4" "$3-$5-x86_64-unknown-linux-gnu.tar.gz")|" \
              "$1" > "$6"
          }
          rel="https://github.com/${REPO}/releases/download"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${OWNER}/homebrew-tap.git" tap
          mkdir -p tap/Formula
          render .github/homebrew/ringo.rb      "${rel}/${PHONE_TAG}" ringo      "$PHONE_TAG" "${PHONE_TAG#v}"            tap/Formula/ringo.rb
          render .github/homebrew/ringo-flow.rb "${rel}/${FLOW_TAG}"  ringo-flow "$FLOW_TAG"  "${FLOW_TAG#ringo-flow-v}" tap/Formula/ringo-flow.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula
          git commit -m "ringo ${PHONE_TAG#v}, ringo-flow ${FLOW_TAG#ringo-flow-v}" || { echo "no changes"; exit 0; }
          git push
