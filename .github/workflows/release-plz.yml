name: Release-plz

# Division of labour:
#   release-plz (this file): versions, changelogs, crates.io publish (core→phone→
#     flow), and ONE shared tag `v{version}`.
#   cargo-dist (.github/workflows/release.yml, triggered by that tag): binaries for
#     both apps + the GitHub release + Homebrew formulae.
#   this file also pushes the ringo-flow Docker image to GHCR (cargo-dist has no
#     Docker support).
#
# release-plz uses a PAT (RELEASE_PLZ_TOKEN) so the tag it pushes triggers
# cargo-dist — a tag pushed with the default GITHUB_TOKEN does not start workflows.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens/updates the "Release PR" with the version bump + changelogs.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # On merge of the Release PR: publish to crates.io and push the `v{version}` tag
  # (which triggers cargo-dist). Exposes the released ringo-flow version for Docker.
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      flow_version: ${{ steps.released.outputs.flow_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Detect ringo-flow release
        id: released
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          rel='${{ steps.release-plz.outputs.releases }}'
          echo "flow_version=$(echo "$rel" | jq -r '.[] | select(.package_name=="ringo-flow") | .version // empty')" >> "$GITHUB_OUTPUT"

  # ringo-flow Docker image → GHCR (cargo-dist handles binaries/Homebrew, not Docker).
  flow-docker:
    name: Build & push ringo-flow image (GHCR)
    needs: release
    if: needs.release.outputs.flow_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.flow_version }} # the shared release tag
      - name: Compute image tags
        id: tags
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ringo-flow"
          echo "tags=${image}:${VERSION},${image}:latest" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ needs.release.outputs.flow_version }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/ringo-flow/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
