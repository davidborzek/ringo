name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # cargo-husky's build script installs git hooks for local developers on the
  # first dev build. CI never commits, so there's nothing to install — skip it
  # (cargo-husky's recommended CI setting).
  CARGO_HUSKY_DONT_INSTALL_HOOKS: "true"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    # Formatting only parses the workspace crates — no vendored submodules, no
    # build deps, no cache. Runs in parallel and fails fast, independent of the
    # heavy build/test jobs.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev llvm-dev pkg-config perl \
            libspandsp-dev libopus-dev libpulse-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # `--workspace` unifies features so ringo-core is always built with
      # default-audio (pulse). Build ringo-flow in isolation too, to exercise
      # the real headless (aubridge-only) link path that Docker/release ship.
      - run: cargo build -p ringo-flow

  build-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        # OpenSSL is vendored, so only cmake/pkg-config and the dynamic codecs
        # are needed. CoreAudio is a system framework.
        run: brew install cmake pkg-config spandsp opus
      - run: cargo test --workspace

  test-aarch64:
    name: Test (aarch64 Linux)
    # Native ARM runner — no cross-compile, and tests actually run on aarch64
    # (free for public repos; billed for private ones).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev llvm-dev pkg-config perl \
            libspandsp-dev libopus-dev libpulse-dev
      - run: cargo test --workspace
